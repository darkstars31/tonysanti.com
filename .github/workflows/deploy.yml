name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set BASE_PATH
        run: echo "BASE_PATH=" >> $GITHUB_ENV

      - name: Build
        run: npm run build

      - name: Ensure deploy directory permissions
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            sudo mkdir -p /var/www/tonysanti.com/html/
            sudo chown -R ${{ secrets.DEPLOY_SSH_USER }}:${{ secrets.DEPLOY_SSH_USER }} /var/www/tonysanti.com/html/


      - name: Copy build folder to server via rsync
        uses: burnett01/rsync-deployments@v8
        with:
          switches: -avzr --delay-updates --delete-delay
          path: build/
          remote_path: /var/www/tonysanti.com/html/
          remote_host: ${{ secrets.DEPLOY_SSH_HOST }}
          remote_user: ${{ secrets.DEPLOY_SSH_USER }}
          remote_key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

